version: '3.8'

services:
  # Default: Test skill integration with OpenClaw
  skill-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PREDICATE_API_KEY=${PREDICATE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./test-output:/app/test-output
    tty: true
    stdin_open: true
    command: npx ts-node test-skill.ts

  # Alternative: Run the login demo directly (SDK-level)
  demo-login:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PREDICATE_API_KEY=${PREDICATE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HEADLESS=true
    volumes:
      - ./test-output:/app/test-output
    tty: true
    stdin_open: true
    command: npm run demo:login

  # Run with visible browser (requires X11/VNC)
  demo-headed:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PREDICATE_API_KEY=${PREDICATE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HEADLESS=false
      - DISPLAY=:99
    volumes:
      - ./test-output:/app/test-output
    tty: true
    stdin_open: true
    command: >
      bash -c "Xvfb :99 -screen 0 1920x1080x24 &
               sleep 2 &&
               npm run demo:login"
